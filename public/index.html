<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="description" content="SmartCart — Smart grocery management with AI image recognition, barcode scanning, expense tracking and budget optimization." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SmartCart" />

  <title>SmartCart — Smart Grocery Manager</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Apple Touch Icons (fallback emoji icons) -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ZXing Barcode Library -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js" defer></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div id="app">
  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="app-logo">
      <span class="app-logo-icon">🛒</span>
      SmartCart
    </div>
    <div id="header-actions">
      <!-- dynamic per view -->
    </div>
  </header>

  <!-- ── Main Content ────────────────────────────────────────────────────── -->
  <main class="main-content" id="main-content" role="main">
    <div class="loading-overlay">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- ── Bottom Navigation ───────────────────────────────────────────────── -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-item active" data-route="dashboard" id="nav-dashboard" aria-label="Dashboard">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" data-route="lists" id="nav-lists" aria-label="My Lists">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Lists</span>
    </button>
    <button class="nav-item" data-route="analytics" id="nav-analytics" aria-label="Analytics">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Analytics</span>
    </button>
    <button class="nav-item" data-route="optimizer" id="nav-optimizer" aria-label="Budget Optimizer">
      <span class="nav-icon">💡</span>
      <span class="nav-label">Optimizer</span>
    </button>
    <button class="nav-item" data-route="settings" id="nav-settings" aria-label="Settings">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Settings</span>
    </button>
  </nav>
</div>

<!-- ── Toast Container ──────────────────────────────────────────────────── -->
<div id="toast-container" role="status" aria-live="polite"></div>

<!-- ── Modal Container ──────────────────────────────────────────────────── -->
<div id="modal-container"></div>

<!-- ── Camera Overlay (hidden by default) ──────────────────────────────── -->
<div id="camera-overlay" class="camera-overlay hidden" role="dialog" aria-label="Camera">
  <video id="camera-video" class="camera-video" playsinline autoplay muted></video>
  <div class="camera-ui">
    <button id="camera-close-btn" class="camera-close" aria-label="Close camera">✕</button>
    <div id="camera-result" style="width:100%;max-width:360px;"></div>
    <button id="camera-capture-btn" class="camera-capture" aria-label="Take photo"></button>
  </div>
</div>

<!-- ── Barcode Scanner Overlay (hidden by default) ─────────────────────── -->
<div id="barcode-overlay" class="camera-overlay hidden" role="dialog" aria-label="Barcode Scanner">
  <video id="barcode-video" class="camera-video" playsinline autoplay muted></video>
  <div class="camera-ui">
    <button id="barcode-close-btn" class="camera-close" aria-label="Close scanner">✕</button>
    <div class="scanner-frame">
      <div class="scanner-line"></div>
    </div>
    <div id="barcode-result" style="text-align:center;color:#fff;font-size:0.9rem;padding:var(--gap-md);">
      Point camera at barcode
    </div>
  </div>
</div>

<!-- ── JS Modules ───────────────────────────────────────────────────────── -->
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/modules/charts.js"></script>
<script src="/js/modules/camera.js"></script>
<script src="/js/modules/barcode.js"></script>
<script src="/js/views/dashboard.js"></script>
<script src="/js/views/lists.js"></script>
<script src="/js/views/listDetail.js"></script>
<script src="/js/views/shopping.js"></script>
<script src="/js/views/analytics.js"></script>
<script src="/js/views/optimizer.js"></script>
<script src="/js/views/settings.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
