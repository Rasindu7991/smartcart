<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: deep purple → indigo gradient (matches app theme) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#9B3AED"/>
      <stop offset="100%" stop-color="#3730C4"/>
    </linearGradient>

    <!-- Teal accent glow (top-left shimmer) -->
    <radialGradient id="shimmer" cx="28%" cy="22%" r="45%">
      <stop offset="0%"   stop-color="#06d6d6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#06d6d6" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft dark vignette (bottom-right depth) -->
    <radialGradient id="vignette" cx="80%" cy="82%" r="55%">
      <stop offset="0%"   stop-color="#1a0050" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#1a0050" stop-opacity="0"/>
    </radialGradient>

    <!-- Cart body fill: glass white -->
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ddd6fe" stop-opacity="1"/>
    </linearGradient>

    <!-- Teal highlight on cart top edge -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#06d6d6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Spark / checkmark pill -->
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06d6d6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Drop shadow filter for cart -->
    <filter id="cartShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1a0050" flood-opacity="0.45"/>
    </filter>

    <!-- Glow filter for teal spark -->
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background circle ── -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="256" fill="url(#shimmer)"/>
  <circle cx="256" cy="256" r="256" fill="url(#vignette)"/>

  <!-- Subtle inner ring highlight -->
  <circle cx="256" cy="256" r="236" fill="none"
    stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════
       CART GROUP — centred, ~300px wide
  ════════════════════════════════════════════ -->
  <g filter="url(#cartShadow)">

    <!-- ── Handle bar (left pole + horizontal bar) ── -->
    <!-- Vertical pole from handle down to basket -->
    <rect x="102" y="154" width="20" height="112" rx="10" fill="url(#cartGrad)"/>
    <!-- Horizontal handle bar -->
    <rect x="100" y="148" width="82" height="22" rx="11" fill="url(#cartGrad)"/>

    <!-- ── Basket body ── -->
    <!-- Main white rounded rectangle -->
    <rect x="118" y="170" width="276" height="148" rx="20" fill="url(#cartGrad)"/>

    <!-- Teal accent stripe across the top of basket -->
    <rect x="118" y="170" width="276" height="10" rx="5" fill="url(#tealGrad)"/>
    <!-- Clip the bottom corners of stripe so it doesn't poke out -->
    <rect x="118" y="175" width="276" height="5" fill="url(#cartGrad)"/>

    <!-- Inner basket grid lines (purple, subtle) -->
    <!-- Horizontal mid-line -->
    <rect x="134" y="237" width="244" height="6" rx="3" fill="rgba(99,72,200,0.18)"/>
    <!-- Vertical dividers -->
    <rect x="217" y="178" width="6" height="132" rx="3" fill="rgba(99,72,200,0.18)"/>
    <rect x="293" y="178" width="6" height="132" rx="3" fill="rgba(99,72,200,0.18)"/>

    <!-- ── Bottom bar (connects to wheels) ── -->
    <rect x="118" y="308" width="276" height="20" rx="10" fill="url(#cartGrad)"/>

    <!-- ── Wheels ── -->
    <!-- Left wheel -->
    <circle cx="172" cy="352" r="30" fill="#1e1b4b"/>
    <circle cx="172" cy="352" r="18" fill="#312e81"/>
    <circle cx="172" cy="352" r="8"  fill="#4f46e5"/>
    <!-- Right wheel -->
    <circle cx="340" cy="352" r="30" fill="#1e1b4b"/>
    <circle cx="340" cy="352" r="18" fill="#312e81"/>
    <circle cx="340" cy="352" r="8"  fill="#4f46e5"/>
  </g>

  <!-- ── Grocery items in cart (colourful, rounded) ── -->
  <!-- Left tall bag (teal) -->
  <rect x="138" y="184" width="66" height="114" rx="12"
    fill="#06d6d6" opacity="0.92"/>
  <!-- Bag shine -->
  <rect x="148" y="190" width="18" height="40" rx="9"
    fill="rgba(255,255,255,0.35)"/>

  <!-- Middle bag (warm coral/orange) -->
  <rect x="222" y="184" width="60" height="50" rx="12"
    fill="#f97316" opacity="0.95"/>
  <rect x="232" y="190" width="14" height="22" rx="7"
    fill="rgba(255,255,255,0.30)"/>

  <!-- Middle-right bag (yellow) -->
  <rect x="222" y="246" width="60" height="52" rx="12"
    fill="#facc15" opacity="0.95"/>
  <rect x="232" y="252" width="14" height="22" rx="7"
    fill="rgba(255,255,255,0.30)"/>

  <!-- Right tall bag (pink/rose) -->
  <rect x="300" y="184" width="76" height="114" rx="12"
    fill="#f43f5e" opacity="0.92"/>
  <rect x="314" y="190" width="20" height="44" rx="10"
    fill="rgba(255,255,255,0.30)"/>

  <!-- ═══════════════════════════════════════════
       Teal spark badge — bottom-right
  ════════════════════════════════════════════ -->
  <g filter="url(#glowFilter)">
    <circle cx="366" cy="160" r="44" fill="url(#sparkGrad)" opacity="0.95"/>
    <!-- Checkmark / tick  -->
    <polyline points="347,160 360,174 387,145"
      fill="none" stroke="#ffffff" stroke-width="10"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Tiny star sparkles -->
  <circle cx="138" cy="136" r="5" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="375" cy="96"  r="7" fill="#06d6d6" opacity="0.5"/>
  <circle cx="420" cy="210" r="4" fill="#ffffff"  opacity="0.4"/>
  <circle cx="92"  cy="300" r="4" fill="#c4b5fd" opacity="0.4"/>
</svg>
